<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Image Compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for mobile range inputs */
        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #374151;
            border-radius: 4px;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-3xl w-full bg-gray-900 p-6 md:p-8 rounded-3xl shadow-2xl border border-gray-800">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-400">Dynamic Image Compressor</h1>
            <p class="text-gray-500 mt-2 text-sm">Real-time image compression for Android & Web</p>
        </header>

        <!-- Control Panel -->
        <div class="bg-gray-800/50 p-5 rounded-2xl border border-gray-700 mb-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2">Export Format</label>
                    <select id="format" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="image/webp">WebP (Android/Web)</option>
                        <option value="image/png">PNG (Scale-only)</option>
                        <option value="image/jpeg">JPEG (Standard)</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <label id="sliderLabel" class="text-[10px] font-black uppercase tracking-widest text-blue-400">Quality: 80%</label>
                    </div>
                    <input type="range" id="manualSlider" min="5" max="100" value="80" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer outline-none">
                </div>
            </div>
        </div>

        <!-- Touch-Friendly Dropzone -->
        <div id="dropzone" class="relative overflow-hidden border-2 border-dashed border-gray-700 rounded-2xl p-8 md:p-12 text-center hover:border-blue-500 active:bg-gray-800/50 transition-all cursor-pointer mb-8 group">
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📸</div>
            <p class="text-lg font-bold text-gray-200">Tap to select images</p>
            <p class="text-xs text-gray-500 mt-2">Supports multi-file selection from your gallery</p>
        </div>

        <!-- Active Processing Info -->
        <div id="status" class="text-center text-[10px] font-mono text-blue-500 mb-4 h-4 uppercase tracking-widest"></div>

        <!-- Results List -->
        <div id="results" class="space-y-4"></div>
    <footer class="mt-8 pb-4 text-center text-sm text-red-600">
        <p>Conceived and developed by Vaisakh G.</p>
        <p>Queries and suggestions: WhatsApp 9656840794</p>
    </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const manualSlider = document.getElementById('manualSlider');
        const sliderLabel = document.getElementById('sliderLabel');
        const formatSelect = document.getElementById('format');
        const resultsContainer = document.getElementById('results');
        const statusMsg = document.getElementById('status');

        let activeImages = []; // Stores { img, name, originalSize, id }

        // Mobile Fix: Manual trigger for the file picker
        dropzone.addEventListener('click', (e) => {
            if (e.target !== fileInput) {
                fileInput.click();
            }
        });

        // Real-time Slider Updates
        manualSlider.addEventListener('input', () => {
            updateSliderLabel();
            requestAnimationFrame(compressAll);
        });

        formatSelect.onchange = () => {
            updateSliderLabel();
            compressAll();
        };

        function updateSliderLabel() {
            const val = manualSlider.value;
            sliderLabel.innerText = (formatSelect.value === 'image/png') ? `Dimensions: ${val}%` : `Quality: ${val}%`;
        }

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        };

        // Desktop Drag and Drop
        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-gray-800/30'); };
        dropzone.ondragleave = () => dropzone.classList.remove('border-blue-500', 'bg-gray-800/30');
        dropzone.ondrop = (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-gray-800/30');
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            statusMsg.innerText = "Loading Gallery...";
            for (const file of files) {
                const img = await loadImage(file);
                const id = 'asset-' + Math.random().toString(36).substr(2, 9);
                activeImages.push({ img, name: file.name, originalSize: file.size, id });
                
                const div = document.createElement('div');
                div.id = id;
                div.className = "bg-gray-900 border border-gray-800 p-4 rounded-2xl flex items-center justify-between animate-fade-in shadow-lg";
                resultsContainer.prepend(div);
            }
            statusMsg.innerText = "Compressing Assets...";
            compressAll();
            statusMsg.innerText = "";
        }

        function loadImage(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => resolve(img);
                };
            });
        }

        async function compressAll() {
            for (const item of activeImages) {
                const format = formatSelect.value;
                const val = manualSlider.value / 100;
                
                let quality = (format === "image/png") ? 1.0 : val;
                let scale = (format === "image/png") ? val : 1.0;

                const blob = await getBlob(item.img, format, quality, scale);
                updateUI(item, blob);
            }
        }

        function getBlob(img, format, quality, scale) {
            return new Promise(resolve => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(blob => resolve(blob), format, quality);
            });
        }

        function updateUI(item, blob) {
            const container = document.getElementById(item.id);
            if (!container) return;

            const url = URL.createObjectURL(blob);
            const kbSize = (blob.size / 1024).toFixed(1);
            const isOptimized = blob.size < 250000;

            container.innerHTML = `
                <div class="flex-1 min-w-0 pr-4">
                    <p class="text-xs font-bold truncate text-gray-400 mb-1 uppercase tracking-tighter">${item.name}</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-lg font-black ${isOptimized ? 'text-green-400' : 'text-yellow-500'}">${kbSize}KB</span>
                        <span class="text-[10px] text-gray-600 line-through">${(item.originalSize/1024).toFixed(0)}KB</span>
                    </div>
                </div>
                <a href="${url}" download="opt_${item.name}" class="bg-blue-600 active:bg-blue-700 text-white px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-xl shadow-blue-900/20 active:scale-95">
                    Save
                </a>
            `;
        }
    </script>
</body>
</html>
