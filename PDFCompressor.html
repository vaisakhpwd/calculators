<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep PDF Compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 flex flex-col items-center font-sans">

    <div class="max-w-xl w-full bg-zinc-900 p-6 rounded-3xl shadow-2xl border border-zinc-800 relative overflow-hidden">
        
        <!-- Processing Overlay -->
        <div id="loader" class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="statusTxt" class="text-orange-500 font-black text-xs tracking-widest uppercase">Initializing...</p>
        </div>

        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">Deep PDF Compressor</h1>
            <div class="flex justify-center gap-4 mt-2">
                <p id="inSize" class="text-[12px] text-orange-500 font-mono uppercase tracking-tighter">Input: 0 KB</p>
                <p id="outSize" class="text-[12px] text-green-500 font-mono uppercase tracking-tighter font-bold">Output: 0 KB</p>
            </div>
        </header>

        <!-- Settings Area -->
        <div class="bg-zinc-800/30 p-5 rounded-2xl border border-zinc-800 mb-6 space-y-6">
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-[12px] text-zinc-500 font-black uppercase tracking-widest">Quality</label>
                    <span id="qVal" class="text-[12px] text-blue-400 font-mono">60%</span>
                </div>
                <input type="range" id="quality" min="5" max="100" value="60" class="w-full h-1.5 bg-zinc-700 rounded-lg appearance-none accent-blue-500">
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-[12px] text-zinc-500 font-black uppercase tracking-widest">Resolution</label>
                    <span id="sVal" class="text-[12px] text-blue-400 font-mono">70%</span>
                </div>
                <input type="range" id="scale" min="10" max="100" value="70" class="w-full h-1.5 bg-zinc-700 rounded-lg appearance-none accent-blue-500">
            </div>
        </div>

        <!-- MAIN INTERACTION AREA -->
        <div id="dropzone" class="border-2 border-dashed border-zinc-700 rounded-2xl p-8 text-center active:bg-zinc-800 active:border-blue-500 transition-all cursor-pointer mb-6">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <div class="text-4xl mb-3">📄</div>
            <p class="text-lg font-bold">Tap to Select PDF</p>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Compress based on sliders</p>
        </div>

        <!-- Download Result -->
        <div id="results"></div>
        <footer className="mt-8 text-center text-red-600 text-sm font-medium space-y-1 pb-8 border-t border-slate-200 pt-4">
            <p>Conceived and developed by Vaisakh G.</p>
            <p>Queries and suggestions: WhatsApp 9656840794</p>
        </footer>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const loader = document.getElementById('loader');
        const statusTxt = document.getElementById('statusTxt');
        const results = document.getElementById('results');
        const inSize = document.getElementById('inSize');
        const outSize = document.getElementById('outSize');
        
        // Slider Logic
        const qSlider = document.getElementById('quality');
        const sSlider = document.getElementById('scale');
        
        qSlider.oninput = () => document.getElementById('qVal').innerText = qSlider.value + "%";
        sSlider.oninput = () => document.getElementById('sVal').innerText = sSlider.value + "%";

        // Click Logic
        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            inSize.innerText = `Input: ${(file.size / 1024).toFixed(1)} KB`;
            loader.classList.remove('hidden');
            
            const arrayBuffer = await file.arrayBuffer();
            const pdfData = new Uint8Array(arrayBuffer);
            
            try {
                const loadingTask = pdfjsLib.getDocument({data: pdfData});
                const pdf = await loadingTask.promise;
                const outPdf = await PDFDocument.create();
                
                const quality = qSlider.value / 100;
                const scale = (sSlider.value / 100) * 1.5;

                for (let i = 1; i <= pdf.numPages; i++) {
                    statusTxt.innerText = `RASTERIZING PAGE ${i}/${pdf.numPages}...`;
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({canvasContext: ctx, viewport: viewport}).promise;

                    const imgData = canvas.toDataURL('image/jpeg', quality);
                    const jpgImg = await outPdf.embedJpg(imgData);
                    const newPage = outPdf.addPage([jpgImg.width, jpgImg.height]);
                    newPage.drawImage(jpgImg, { x: 0, y: 0, width: jpgImg.width, height: jpgImg.height });
                }

                const bytes = await outPdf.save();
                renderDownload(file.name, bytes);
            } catch (err) {
                console.error(err);
                alert("Processing failed. This could be a protected or malformed PDF.");
            } finally {
                loader.classList.add('hidden');
            }
        };

        function renderDownload(name, bytes) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const sizeKb = (bytes.length / 1024).toFixed(1);
            
            outSize.innerText = `Output: ${sizeKb} KB`;

            results.innerHTML = `
                <a href="${url}" download="opt_${name}" 
                   class="flex items-center justify-between p-5 bg-zinc-800 rounded-2xl border border-blue-500/30 active:scale-95 transition-all">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-zinc-500 uppercase">Optimization Complete</span>
                        <span class="text-xl font-black text-green-400">${sizeKb} KB</span>
                    </div>
                    <div class="bg-green-600 text-white px-5 py-3 rounded-xl text-xs font-black uppercase">Save</div>
                </a>`;
        }
    </script>
</body>
</html>
