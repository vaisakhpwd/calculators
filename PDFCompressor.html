<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Deep Compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-black text-white p-6 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
        <h2 class="text-xl font-bold mb-4 text-orange-500">PDF Deep Compressor</h2>
        
        <label class="block mb-6">
            <span class="text-xs text-zinc-500 uppercase font-bold mb-2 block">1. Select your File</span>
            <input type="file" id="fileInput" accept="application/pdf" 
                class="block w-full text-sm text-zinc-400
                file:mr-4 file:py-3 file:px-6
                file:rounded-full file:border-0
                file:text-sm file:font-bold
                file:bg-orange-600 file:text-white
                hover:file:bg-orange-500 transition-all">
        </label>

        <div class="space-y-4 mb-6">
            <div>
                <label class="text-[10px] text-zinc-500 font-bold uppercase">Quality (5-100)</label>
                <input type="range" id="quality" min="5" max="100" value="60" class="w-full accent-orange-600">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 font-bold uppercase">Scale (10-100)</label>
                <input type="range" id="scale" min="10" max="100" value="70" class="w-full accent-orange-600">
            </div>
        </div>

        <div id="status" class="text-center font-mono text-xs text-orange-400 mb-4 h-4"></div>
        <div id="results"></div>

    <footer class="mt-8 pb-4 text-center text-sm text-red-600">
        <p>Conceived and developed by Vaisakh G.</p>
        <p>Queries and suggestions: WhatsApp 9656840794</p>
    </footer>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const results = document.getElementById('results');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "STARTING...";
            const arrayBuffer = await file.arrayBuffer();
            
            try {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(arrayBuffer)}).promise;
                const outPdf = await PDFDocument.create();
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    status.innerText = `PROCESSING PAGE ${i}/${pdf.numPages}`;
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({scale: (document.getElementById('scale').value / 100) * 1.5});
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({canvasContext: ctx, viewport: viewport}).promise;

                    const imgData = canvas.toDataURL('image/jpeg', document.getElementById('quality').value / 100);
                    const jpgImg = await outPdf.embedJpg(imgData);
                    const newPage = outPdf.addPage([jpgImg.width, jpgImg.height]);
                    newPage.drawImage(jpgImg, { x: 0, y: 0, width: jpgImg.width, height: jpgImg.height });
                }

                status.innerText = "FINALIZING...";
                const bytes = await outPdf.save();
                const blob = new Blob([bytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);

                results.innerHTML = `
                    <div class="mt-4 p-4 bg-zinc-800 rounded-lg flex flex-col gap-3">
                        <p class="text-xs text-zinc-400 break-all">${file.name}</p>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-green-500">${(bytes.length/1024/1024).toFixed(2)} MB</span>
                            <a href="${url}" download="small_${file.name}" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-xs uppercase">Download PDF</a>
                        </div>
                    </div>`;
                status.innerText = "COMPLETE";
            } catch (err) {
                status.innerText = "FAILED TO PROCESS";
                console.error(err);
            }
        };
    </script>
</body>
</html>
